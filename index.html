<html>
<head>
    <title>The Elizabeth File</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Permanent Marker', cursive;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Capa oscura encima de la imagen para que el texto resalte */
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), 
                        url('imagen.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            text-align: center;
            transform: rotate(-3deg);
        }

        h1 {
            font-size: 8rem;
            color: #ba212e;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -5px;
            text-shadow: 3px 3px 0px #d0c0c0;
        }

        .start-btn {
            margin-top: 40px;
            padding: 10px 30px;
            font-size: 2rem;
            font-family: inherit;
            background: transparent;
            color: #eee;
            border: 4px solid #400909;
            cursor: pointer;
            transition: 0.3s;
        }

        .start-btn:hover {
            background: #c61414;
            color: #fff;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div class="background"></div>

    <div class="container">
        <h1>THE ELIZABETH<br>FILE</h1>
        
        <button class="start-btn" onclick="alert('Cargando...')">
            JUGAR
        </button>
    </div>

</body>
</html>
