
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>The Elizabeth File</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Permanent Marker', cursive;
        }

        /* Fondo del menú  */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), 
                        url('imagen.jpg'); /* Tu fondo de menú */
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            text-align: center;
            transform: rotate(-3deg);
        }

        h1 {
            font-size: 8rem;
            color: #ba212e;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -5px;
            text-shadow: 3px 3px 0px #d0c0c0;
            animation: glitchMove 0.6s infinite;
        }

        @keyframes glitchMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-2px, 2px) rotate(-1deg); }
            40% { transform: translate(2px, -2px) rotate(1deg); }
            60% { transform: translate(-1px, 1px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .start-btn {
            margin-top: 40px;
            padding: 10px 30px;
            font-size: 2rem;
            font-family: inherit;
            background: transparent;
            color: #eee;
            border: 4px solid #400909;
            cursor: pointer;
            transition: 0.3s;
        }

        .start-btn:hover {
            background: #c61414;
            color: #fff;
            transform: scale(1.1);
        }

        /*  PANTALLA */
        #pantalla-case {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: #000 url('005.png') no-repeat center center;
            background-size: contain; /* O 'cover' si quieres que llene todo */
            cursor: pointer;
            transition: filter 0.3s;
        }

        #pantalla-case:hover {
            filter: brightness(1.2);
        }

        /*  CONTENEDOR DE VIDEO  */
        #contenedor-video {
            display: none;
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: black;
            z-index: 200;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /*  MENÚ DE PISTAS  */
        #menu-pistas {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            width: 250px;
            background: rgba(20, 20, 20, 0.9);
            border: 3px solid #ba212e;
            color: white;
            padding: 15px;
            z-index: 300;
            box-shadow: 0 0 15px rgba(186, 33, 46, 0.5);
        }

        #menu-pistas h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            color: #ba212e;
            text-decoration: underline;
        }

        .pista-item {
            border-bottom: 1px solid #444;
            padding: 5px 0;
            color: #d0c0c0;
            list-style: none;
        }
    </style>
</head>

<body>

    <div class="background"></div>

    <div class="container" id="menu-inicio">
        <h1>THE ELIZABETH<br>FILE</h1>
        <button class="start-btn" onclick="mostrarImagenCase()">JUGAR</button>
    </div>

    <div id="pantalla-case" onclick="comenzarVideo()"></div>

    <div id="menu-pistas">
        <h2>EVIDENCIAS</h2>
        <ul id="lista-pistas"></ul>
    </div>

    <div id="contenedor-video">
        <video id="videoContexto">
            <source src="hola.mp4" type="video/mp4">
            Tu navegador no soporta el formato de video.
        </video>
    </div>

    <script>
        const musica = new Audio('killer.mp3'); 
        musica.loop = true; 
        musica.volume = 0.5;

        const video = document.getElementById('videoContexto');
        const pantallaCase = document.getElementById('pantalla-case');
        const frameVideo = document.getElementById('contenedor-video');

        function añadirPista(texto) {
            const lista = document.getElementById('lista-pistas');
            const nuevaPista = document.createElement('li');
            nuevaPista.className = 'pista-item';
            nuevaPista.innerText = "> " + texto;
            lista.appendChild(nuevaPista);
        }

        // 1. Al pulsar JUGAR: Suena música
        function mostrarImagenCase() {
            musica.play().catch(error => console.log("Audio interact:", error));
            document.getElementById('menu-inicio').style.display = 'none';
            document.querySelector('.background').style.display = 'none';
            pantallaCase.style.display = 'block';
        }

        //2. Al hacer clic en la imagen: Empieza el video
        function comenzarVideo() {
            pantallaCase.style.display = 'none';
            frameVideo.style.display = 'block';
            
            musica.volume = 0.1; // Bajar música para el video
            video.play();
        }

        // 3. Al terminar el video
        video.onended = function() {
            musica.volume = 0.5; // Subir música
            frameVideo.style.display = 'none';
            
            document.getElementById('menu-pistas').style.display = 'block';
            añadirPista("Expediente abierto");
            alert("Preparando archivo Elizabeth...");

    
        };

        // 3. Fin del VIDEO -> Salto a POLICIA.HTML
        video.onended = function() {
            window.location.href = "poliia.html";
        };

    </script>

</body>
</html>
