<head>
    <meta charset="UTF-8">
    <title>The Elizabeth File</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Permanent Marker', cursive; 
        }

        .background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), url('imagen.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: -1; 
        }

        .container {
            text-align: center;
            transform: rotate(-3deg);
        }

        h1 {
            font-size: 8rem;
            color: #ba212e;
            margin: 0;
            line-height: 0.8;
            letter-spacing: -5px;
            text-shadow: 3px 3px 0px #d0c0c0;
            animation: glitchMove 0.6s infinite;
        }

        @keyframes glitchMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-2px, 2px) rotate(-1deg); }
            40% { transform: translate(2px, -2px) rotate(1deg); }
            60% { transform: translate(-1px, 1px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); } 
        }

        .start-btn {
            margin-top: 40px;
            padding: 10px 30px;
            font-size: 2rem;
            font-family: inherit;
            background: transparent;
            color: #eee;
            border: 4px solid #400909;
            cursor: pointer;
            transition: 0.3s; 
        }

        .start-btn:hover {
            background: #c61414;
            color: #fff;
            transform: scale(1.1); 
        }

        #pantalla-case {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            background: #000 url('005.png') no-repeat center center;
            background-size: contain;
            cursor: pointer;
        }

        #contenedor-video {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 200;
        }

        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>

<body>

    <div class="background"></div>

    <div class="container" id="menu-inicio">
        <h1>THE ELIZABETH<br>FILE</h1>
        <button class="start-btn" onclick="mostrarImagenCase()">JUGAR</button>
    </div>

    <div id="pantalla-case" onclick="comenzarVideo()"></div>

    <div id="contenedor-video">
        <video id="videoContexto">
            <source id="videoSource" src="holaa1.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const video = document.getElementById('videoContexto');
        const videoSource = document.getElementById('videoSource');
        const pantallaCase = document.getElementById('pantalla-case');
        const frameVideo = document.getElementById('contenedor-video');

        // Variable para saber en qué video estamos
        let videoActual = 1;

        function mostrarImagenCase() {
            document.getElementById('menu-inicio').style.display = 'none';
            document.querySelector('.background').style.display = 'none';
            pantallaCase.style.display = 'block';
        }

        function comenzarVideo() {
            pantallaCase.style.display = 'none';
            frameVideo.style.display = 'block';
            video.play();
        }

        video.onended = function() {
            if (videoActual === 1) {
                // Si terminó el video 1, cargamos el 2
                videoActual = 2;
                video.src = "holaa2.mp4"; // Cambiamos la fuente
                video.load();             // Cargamos el nuevo archivo
                video.play();             // Lo reproducimos
            } else {
                // Si ya terminó el video 2, redirigimos
                window.location.href = "poliia.html";
            }
        };
    </script>

</body>
