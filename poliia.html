
<head>
    <meta charset="UTF-8">
    <title>The Elizabeth File - Día 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body { background: #050505; margin: 0; display: flex; justify-content: center; overflow: hidden; font-family: 'Rajdhani', sans-serif; }

        .escena-container { position: relative; z-index: 1; }
        img[usemap] { max-height: 100vh; filter: grayscale(0.3) contrast(1.2); width: auto; }
        
        /* CURSOR NORMAL */
        area { cursor: pointer; outline: none; }

        /* BOTÓN SIGUIENTE DÍA */
        #btn-siguiente-dia {
            display: none; 
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #ba212e;
            color: white;
            padding: 15px 40px;
            border: 2px solid #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 0 20px rgba(186, 33, 46, 0.8);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { transform: translateX(-50%) scale(1); box-shadow: 0 0 0 0 rgba(186, 33, 46, 0.7); }
            70% { transform: translateX(-50%) scale(1.05); box-shadow: 0 0 0 15px rgba(186, 33, 46, 0); }
            100% { transform: translateX(-50%) scale(1); box-shadow: 0 0 0 0 rgba(186, 33, 46, 0); }
        }

        /* SMARTPHONE */
        #smartphone {
            position: fixed; right: 30px; bottom: 30px;
            width: 240px; height: 480px;
            background: #111; border: 4px solid #333;
            border-radius: 35px; padding: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            z-index: 1000;
        }

        .screen {
            flex: 1; height: 100%;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1000') center/cover;
            border-radius: 25px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; padding: 10px; box-sizing: border-box;
        }

        .apps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 50px; }
        .app-icon {
            width: 50px; height: 50px; border-radius: 12px; 
            cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 22px;
            transition: 0.2s;
        }
        .app-icon:hover { transform: scale(1.1); }

        .app-window {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f0f0f; z-index: 200; padding: 15px; box-sizing: border-box; color: white;
            overflow-y: auto;
        }
        .btn-close { color: #ff4d4d; cursor: pointer; font-size: 11px; font-weight: bold; margin-bottom: 15px; display: block; }
        
        .pista-link { color: #4db8ff; text-decoration: underline; cursor: pointer; display: block; margin-bottom: 10px; }
        #visor-pista {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 300; flex-direction: column; align-items: center; justify-content: center;
        }
        #img-evidencia { max-width: 90%; border: 2px solid white; }

        #notificaciones { position: absolute; bottom: 10px; width: 90%; left: 5%; z-index: 500; }
        .notif { background: rgba(186, 33, 46, 0.9); color: white; font-size: 10px; padding: 8px; border-radius: 8px; margin-top: 5px; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* PANTALLA FINAL DÍA 1 */
        #final-dia-wrapper {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10001;
            background: #000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        #final-dia-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="escena-container">
        <img src="cuerpo.png" alt="escena" usemap="#escena">
        <map name="escena">
            <area shape="poly" coords="672,596,667,568,690,533,755,490,816,442,947,476,751,614" href="javascript:void(0)" onclick="recogerEvidencia('Brazo', '💪', 'brazo.png')">
            <area shape="poly" coords="522,328,491,314,488,279,560,276,555,316" href="javascript:void(0)" onclick="recogerEvidencia('Placa Agente', '🛡️', 'policia.png')">
            <area shape="poly" coords="1134,261,1273,254,1274,320,1143,316" href="javascript:void(0)" onclick="recogerEvidencia('NOTAS', '📜', 'jeolglíficos.png')">
        </map>
    </div>

    <button id="btn-siguiente-dia" onclick="activarTransicionFinal()">SIGUIENTE DÍA ➔</button>

    <div id="smartphone">
        <div class="screen">
            <div class="apps-grid">
                <div class="app-icon" style="background: #3b5998;" onclick="abrirApp('archivo')">📁</div>
                <div class="app-icon" style="background: #25d366;" onclick="abrirApp('mensajes')">💬</div>
                <div class="app-icon" style="background: #e1306c;">📸</div>
            </div>

            <div id="archivo" class="app-window">
                <span class="btn-close" onclick="cerrarApp('archivo')">✖ CERRAR</span>
                <h4 style="color:#4db8ff">EVIDENCIAS</h4>
                <div id="lista-pistas">NO HI HA RES...</div>
            </div>

            <div id="visor-pista">
                <span class="btn-close" onclick="cerrarVisor()" style="position:absolute; top:20px; left:20px;">← VOLVER</span>
                <img id="img-evidencia" src="" alt="pista">
                <p id="txt-evidencia" style="color:white; font-size:12px; margin-top:10px;"></p>
            </div>

            <div id="notificaciones"></div>
        </div>
    </div>

    <div id="final-dia-wrapper" onclick="irAlDia2()">
        <img src="dia1f.png" alt="Día 1 Finalizado">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/image-map-resizer/1.0.10/js/imageMapResizer.min.js"></script>
    <script>
        window.onload = () => {
            localStorage.removeItem('evidenciasElizabeth');
            imageMapResize();
        };

        function recogerEvidencia(nombre, icono, imgUrl) {
            let datos = JSON.parse(localStorage.getItem('evidenciasElizabeth')) || [];
            if (datos.some(p => p.nombre === nombre)) return;

            datos.push({ nombre, icono, img: imgUrl });
            localStorage.setItem('evidenciasElizabeth', JSON.stringify(datos));
            
            crearNotificacion("EVIDENCIA ENCONTRADA", icono + " " + nombre);
            actualizarListaPistas();

            // Si llegamos a 3 pistas, aparece el botón
            if (datos.length >= 3) {
                setTimeout(() => {
                    document.getElementById('btn-siguiente-dia').style.display = 'block';
                }, 1000);
            }
        }

        function activarTransicionFinal() {
            document.getElementById('btn-siguiente-dia').style.display = 'none';
            document.getElementById('final-dia-wrapper').style.display = 'flex';
        }

        function irAlDia2() {
            window.location.href = "dia2.html";
        }

        function actualizarListaPistas() {
            const lista = document.getElementById('lista-pistas');
            const datos = JSON.parse(localStorage.getItem('evidenciasElizabeth')) || [];
            lista.innerHTML = datos.map(p => `
                <div class="pista-link" onclick="verFoto('${p.img}', '${p.nombre}')">
                    📁 Ver: ${p.nombre}
                </div>
            `).join('');
        }

        function verFoto(url, nombre) {
            document.getElementById('visor-pista').style.display = 'flex';
            document.getElementById('img-evidencia').src = url;
            document.getElementById('txt-evidencia').innerText = nombre;
        }

        function cerrarVisor() {
            document.getElementById('visor-pista').style.display = 'none';
        }

        function abrirApp(id) { 
            if (id === 'mensajes') {
                crearNotificacion("SISTEMA", "🔒 App de mensajes no disponible aún.");
            } else {
                document.getElementById(id).style.display = 'block'; 
            }
        }

        function cerrarApp(id) { document.getElementById(id).style.display = 'none'; }

        function crearNotificacion(titulo, mensaje) {
            const contenedor = document.getElementById('notificaciones');
            const n = document.createElement('div');
            n.className = 'notif';
            n.innerHTML = `<strong>${titulo}</strong><br>${mensaje}`;
            contenedor.appendChild(n);
            setTimeout(() => n.remove(), 3500);
        }
    </script>
</body>
</html>
